<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Clock</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
  </style>

</head>
<body class="w-full min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(rgb(0, 0, 0), rgb(192, 131, 252), rgb(202, 217, 249));">
  <main class="w-full max-w-2xl mx-auto text-center space-y-8">
    <header>
      <h1 class="mono" style="color: #fff; font-size: 64px;">The Ultimate Countdown</h1>
    </header>
    <div id="countdown-container"
     class="grid grid-cols-2 sm:grid-cols-4 gap-4 hidden">
      <div class="p-6 bg-white">
        <div id="num-days" class="text-5xl font-bold">00</div>
        <div class="mt-2">Days</div>
      </div>
      <div class="p-6 bg-white">
        <div id="num-hours" class="text-5xl font-bold">00</div>
        <div class="mt-2">Hours</div>
      </div>
      <div class="p-6 bg-white">
        <div id="num-minutes" class="text-5xl font-bold">00</div>
        <div class="mt-2">Minutes</div>
      </div>
      <div class="p-6 bg-white">
        <div id="num-seconds" class="text-5xl font-bold">00</div>
        <div class="mt-2">Seconds</div>
      </div>
    </div>
    <p id="finished-msg" class="mono hidden" style="color: rgb(245, 158, 11); font-size: 32px;">You are now free!😀</p>
  </main>
<button id="show-btn"
        class="px-6 py-3 bg-white text-black font-bold">
  Show Countdown
</button>

  <script>
    const target = new Date("2026-06-22T13:19:00").getTime();
    let interval = setInterval(tick, 1000);

    function tick() {
      const diff = Math.max(0, target - Date.now());
      const s = Math.floor(diff / 1000);
      document.getElementById('num-days').textContent = String(Math.floor(s / 86400)).padStart(2, '0');
      document.getElementById('num-hours').textContent = String(Math.floor((s % 86400) / 3600)).padStart(2, '0');
      document.getElementById('num-minutes').textContent = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      document.getElementById('num-seconds').textContent = String(s % 60).padStart(2, '0');
      if (diff <= 0) {
        clearInterval(interval);
        document.getElementById('finished-msg').classList.remove('hidden');
      }
	  if (diff <= 0) {
  clearInterval(interval);
  document.getElementById('finished-msg').classList.remove('hidden');
  launchCelebration(); // 🎉 add this line
}

    }
	function launchCelebration() {
  // Play sound
  document.getElementById('end-sound').play();

  // Confetti burst for 5 seconds
  const duration = 5 * 1000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 55,
      origin: { x: 0 }
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 55,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  }());
}

document.getElementById('show-btn').addEventListener('click', () => {
    document.getElementById('countdown-container')
            .classList.remove('hidden');

    document.getElementById('show-btn')
            .classList.add('hidden');

    tick(); // update immediately
    interval = setInterval(tick, 1000);
});
  </script>
  <audio id="end-sound" src="end.mp3" preload="auto"></audio>
</body>
</html>
